global:
  scrape_interval: 15s

scrape_configs:

  # 🔹 Azure Functions / APIs
  - job_name: 'app-metrics'
    metrics_path: /metrics
    static_configs:
      - targets:
          - localhost:8000   # replace with service endpoints

  # 🔹 Node Exporter (VM / AKS nodes)
  - job_name: 'node-exporter'
    static_configs:
      - targets:
          - localhost:9100

  # 🔹 Kubernetes (if using AKS)
  - job_name: 'kubernetes-pods'
    kubernetes_sd_configs:
      - role: pod

    relabel_configs:
      - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_scrape]
        action: keep
        regex: true